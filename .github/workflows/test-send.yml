# Phase 0 throwaway workflow. Delete after the Phase 0 gate is met.
# Two cron lines cover US daylight (CDT) and standard (CST) time so exactly one
# fires near 8:30 AM Central year-round. Also runnable on demand via the Actions
# tab (workflow_dispatch). Must run on Actions, not locally: only the cloud runner
# reveals runner-IP blocking and scheduler timing.
name: Phase 0 Test Send

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 13 * * 1-5"   # 8:30 CT during CDT (13:30 UTC)
    - cron: "30 14 * * 1-5"   # 8:30 CT during CST (14:30 UTC)

jobs:
  test-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance
      - run: python test_send.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
